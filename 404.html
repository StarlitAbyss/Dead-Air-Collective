<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 - Dead Air Collective</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div class="crt-screen">
    <div class="noise-overlay"></div>
    <div class="grain-overlay"></div>

    <div class="container glow">
      <!-- 404 Message -->
      <section id="not-found">
        <div class="error-code">404</div>
        <h1 class="glitch-text" data-text="Signal Lost">Signal Lost</h1>
        <p class="error-description">Oops! The page you're looking for has vanished into the static.</p>
        <p class="error-description">Maybe it's hiding somewhere in the dead air...</p>
        <a href="/" class="return-button">Return to Main Broadcast →</a>
      </section>
      
      </div>
    </div>
  </div>
</body>
</html>
